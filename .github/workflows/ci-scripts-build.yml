name: RTEMS 4.9

on: [push, pull_request]

defaults:
  run:
    working-directory: rtems

jobs:
  build-pc386:
    name: pc386
    runs-on: ubuntu-20.04
    steps:
    - uses: actions/checkout@v2
    - name: system deps
      run: sudo apt-get -y update && sudo apt-get -y install bison flex texinfo unzip git python-dev qemu-system-x86
    - name: check
      run: ../source-builder/sb-check
    - name: build
      run: ../source-builder/sb-set-builder --prefix=$HOME/.rtems --log i386.log --with-rtems --with-rtems-tests=samples --with-rtemsbsp=pc386 4.9/rtems-i386.bset
    - name: error log
      run: |
        echo "==============="
        tail -n 100 i386.log
    - name: run tests
      run: |
        find $HOME/.rtems -name '*.exe'
        for ff in $HOME/.rtems/i386-rtems5/pc386/tests/*.exe; do
          echo "==== $ff";
        done

  build-mvme3100:
    name: mvme3100
    runs-on: ubuntu-20.04
    steps:
    - uses: actions/checkout@v2
    - name: system deps
      run: sudo apt-get -y update && sudo apt-get -y install bison flex texinfo unzip git python-dev
    - name: check
      run: ../source-builder/sb-check
    - name: build
      run: ../source-builder/sb-set-builder --prefix=$HOME/.rtems --log powerpc.log --with-rtems --with-rtems-tests=samples --with-rtemsbsp=mvme3100 4.9/rtems-powerpc.bset
    - name: error log
      run: |
        echo "==============="
        tail -n 100 powerpc.log
    - name: run tests
      run: |
        find $HOME/.rtems -name '*.exe'
        for ff in $HOME/.rtems/powerpc-rtems5/mvme3100/tests/*.exe; do
          echo "==== $ff";
        done

